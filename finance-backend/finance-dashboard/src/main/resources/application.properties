# Project name
spring.application.name=finance-dashboard

# Database URL with environment variable support
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance_db?createDatabaseIfNotExist=true}

# Database username with environment variable support
spring.datasource.username=${DB_USER:root}

# Securely fetch the database password from environment variables
spring.datasource.password=${DB_PASS}

# Automatic database schema updates
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL in the console for debugging
spring.jpa.show-sql=true

# Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8081
spring.main.allow-bean-definition-overriding=true